services:
  postgres:
    image: postgres:15
    container_name: job-postgres
    environment:
      POSTGRES_DB: jobqueue
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobuser -d jobqueue"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
